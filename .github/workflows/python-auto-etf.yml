name: ETF AutoTrader Daily Run

on:
  schedule:
    - cron: '30 0 * * *'  # daily 09:30 KST (00:30 UTC)
  workflow_dispatch:
    inputs:
      run_target:
        description: 'Select which script to run'
        required: true
        default: backtest
        type: choice
        options:
          - backtest
          - main

jobs:
  run-etf-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment variables
        run: |
          echo "EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}" >> $GITHUB_ENV
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}" >> $GITHUB_ENV

      - name: Run ETF AutoTrader (schedule)
        if: github.event_name == 'schedule'
        run: |
          python main.py

      - name: Run selected target (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.run_target }}" = "main" ]; then
            python main.py
          else
            python final_backtest.py
          fi
