name: ETF AutoTrader Daily Run

on:
  schedule:
    - cron: '30 0 * * *'  # daily 09:30 KST (00:30 UTC)
  workflow_dispatch:
    inputs:
      run_target:
        description: 'Select which script to run'
        required: true
        default: backtest
        type: choice
        options:
          - backtest
          - main

jobs:
  run-etf-bot:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show runner time
        run: |
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"
          python -c "from datetime import datetime; print('Python local:', datetime.now().strftime('%Y-%m-%d %H:%M:%S'))"

      - name: Run ETF AutoTrader (schedule)
        if: github.event_name == 'schedule'
        run: |
          python run_today_analysis.py

      - name: Run selected target (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.run_target }}" = "main" ]; then
            python run_today_analysis.py
          else
            python final_backtest.py
          fi
      - name: Debug workflow source
        run: |
          echo "REF=$GITHUB_REF"
          echo "SHA=$GITHUB_SHA"
          echo "WORKFLOW=$GITHUB_WORKFLOW"
          sed -n '1,120p' .github/workflows/python-auto-etf.yml
